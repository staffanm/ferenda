# Continuous deploy to ferenda-vps.
#
# Runs on a SELF-HOSTED runner installed on the VPS (as the `ferenda` user, in
# the docker group) -- see docs/deploy-vps.md for registration. On every push to
# the deployed branch it fast-forwards the on-box checkout, rebuilds the
# accommodanda image, brings the stack up, and folds any new input DATA into the
# corpus.
#
# It deliberately runs the rebuild with `--ignore-code-changes`, so a code push
# does NOT trigger a reparse/regenerate: the small prod host can't re-parse
# ~100K förarbeten within a deploy's time budget (the from-scratch reparse blew
# past GitHub's 6h ceiling and was cancelled). A code-driven rebuild is instead
# done deliberately on the fast dev box and pushed up with `sync-data`, after
# tools/vps/download-data.sh pulls the live corpus down first. This step still
# incrementally folds in new input data and redeploys.
#
# No secrets travel through GitHub: the runner already sits on the box with the
# checkout, the mounted corpus and docker access. The nightly `lagen all all`
# (download + rebuild) is a separate host cron, not this workflow.

name: deploy

on:
  push:
    branches: [modernization]
  workflow_dispatch: {}   # allow a manual redeploy from the Actions tab

# Never let two deploys run at once (a rebuild can take a while); queue instead
# of cancelling a rebuild already in flight.
concurrency:
  group: ferenda-vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, ferenda-vps]
    # No actions/checkout: we deploy the persistent on-box checkout, not the
    # runner's throwaway workspace.
    steps:
      - name: Update the on-box checkout to the pushed commit
        run: |
          set -euo pipefail
          cd /srv/ferenda/ferenda
          # A prior run cancelled mid-git (e.g. the 6h rebuild timeout) can leave a
          # stale lock that fails the next fetch/reset with exit 128; clear it first.
          rm -f .git/index.lock .git/shallow.lock .git/refs/remotes/origin/*.lock || true
          # Retry the fetch: transient GitHub connectivity has intermittently 128'd
          # this step (it self-heals on the next push, but shouldn't fail a deploy).
          # git's own stderr is printed, so a genuine, persistent failure is visible.
          for attempt in 1 2 3; do
            if git fetch --prune origin; then break; fi
            [ "$attempt" = 3 ] && { echo "git fetch failed after 3 attempts" >&2; exit 1; }
            echo "git fetch failed (attempt $attempt/3); retrying in $((attempt * 5))s" >&2
            sleep $((attempt * 5))
          done
          git reset --hard "${GITHUB_SHA}"

      - name: Build the accommodanda image
        run: |
          set -euo pipefail
          cd /srv/ferenda/ferenda
          docker compose build accommodanda

      - name: Bring the stack up (opensearch + app + nginx + certbot)
        run: |
          set -euo pipefail
          cd /srv/ferenda/ferenda
          docker compose --profile prod up -d

      - name: Fold new input data into the corpus and redeploy
        # --ignore-code-changes: rebuild only on input-data changes, never on a
        # parser/render code change (that reparse is done on dev + synced up).
        run: |
          set -euo pipefail
          cd /srv/ferenda/ferenda
          docker compose exec -T accommodanda lagen all rebuild --ignore-code-changes
