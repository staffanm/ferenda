# lagen.nu — one compose project, two sites, selected by Compose profiles.
#
#   DEV  (only the search backend the rebuilt pipeline needs):
#       docker compose up -d
#     -> starts *just* opensearch (it carries no profile). Run accommodanda
#        itself straight from the working tree -- `lagen all serve` -- because
#        it is continuously re-edited and restarted; there is no point
#        containerising it in dev.
#
#   PROD (the full host: the legacy lagen.nu stack + the rebuilt site):
#       docker compose --profile prod up -d
#     -> everything below. The legacy nginx fronts both vhosts:
#          lagen.nu          -> legacy ferenda (uwsgi/gunicorn)
#          ferenda.lagen.nu  -> accommodanda (uvicorn), the rebuilt site+API
#        See docker/nginx/ferenda.lagen.nu.conf.
#
# Rule of thumb: a service with NO `profiles:` key starts in every invocation
# (that's opensearch, shared by dev and prod); everything tagged
# `profiles: [prod]` starts only under `--profile prod`.

services:
  # --- shared: the rebuilt full-text index (dev + prod) --------------------
  # A single-node, security-disabled OpenSearch 2.x at the code's default
  # endpoint (config.DEFAULT_OPENSEARCH_URL = http://localhost:9200). Security
  # is OFF on purpose: a local index over public data, plain HTTP, no auth.
  # Do NOT expose port 9200 to the internet -- the prod host firewall must keep
  # 9200/9600 closed; only the accommodanda container talks to it (over the
  # compose network as http://opensearch:9200). On WSL2, if it won't boot,
  # raise vm.max_map_count: `sudo sysctl -w vm.max_map_count=262144`.
  opensearch:
    # Pinned to 3.7.0 (Lucene 10). Frozen at 2.9.0 for years because 2.10.0+
    # images require the x86-64-v2 CPU baseline and the prod host's virtualized
    # CPU didn't expose it -- 2.10.0 died with "Fatal glibc error: CPU does not
    # support x86-64-v2". The hypervisor CPU model was upgraded to x86-64-v3 in
    # 2026-07, lifting the block: 3.7.0 boots clean + green on the host (verified
    # in an isolated throwaway container). The index is derived & rebuildable, so
    # the 2.x->3.x major bump is a nuke-and-rebuild (delete the index, `lagen all
    # index`), never an in-place migration. Pin a specific patch, not floating 3.
    image: opensearchproject/opensearch:3.7.0
    container_name: lagen-opensearch
    environment:
      - discovery.type=single-node           # one node; relaxes the bootstrap checks
      - DISABLE_SECURITY_PLUGIN=true          # -> plain http://localhost:9200, no auth
      - DISABLE_INSTALL_DEMO_CONFIG=true      # skip the demo TLS certs/users
      - bootstrap.memory_lock=true            # keep the JVM heap out of swap
      - OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g    # 15GB host. Headroom opened up: the
                                              # legacy Elasticsearch dropped 8g->3g
                                              # and fuseki (2g) now runs ONLY during
                                              # the nightly legacy regen (host cron
                                              # start/stops it around `build all
                                              # all`), so it isn't resident by day.
                                              # 2g is generous already -- measured
                                              # heap use is ~24% of 1g (the collapse
                                              # index is deliberately not heap-hungry:
                                              # no parent-child join). The bigger win
                                              # from the freed RAM is OS page cache
                                              # for the on-disk index, not JVM heap.
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"        # REST API -- the endpoint the code connects to
      - "9600:9600"        # performance analyzer (optional)
    volumes:
      - opensearch-data:/usr/share/opensearch/data   # persist the index across restarts
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18          # first boot can take a couple of minutes
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "10"

  # --- prod: the rebuilt site (ferenda.lagen.nu) ---------------------------
  # The code is baked into the image (which also carries the full pipeline
  # toolchain); the corpus and the wiki content repo are read-write bind-mounts.
  # One uvicorn process serves the static site + REST API (`lagen all serve`,
  # the image CMD), and the same container runs maintenance in place:
  #     docker compose exec accommodanda lagen all rebuild
  #     docker compose exec accommodanda lagen all index
  accommodanda:
    build:
      context: ../accommodanda
      dockerfile: docker/accommodanda/Dockerfile
      args:
        # uid 1001 = host `staffan`, who owns the bind-mounted corpus + catalog.
        # gid 3362 = host `lagen-nfs`. data_root now lives on the /mnt/forstor NFS
        # export, which is root_squashed (root -> nobody, no write) and writable
        # only by the lagen-nfs group -- so the in-container pipeline (`lagen all
        # rebuild`/`all`, which writes downloaded/, artifact/, generated/) must run
        # under gid 3362, NOT root, or it EPERMs against the NFS mount.
        UID: "1001"
        GID: "3362"
        # the deployed revision, baked into the image for the ops dashboard;
        # the deploy passes GIT_SHA=$GITHUB_SHA (see .github/workflows/deploy.yml).
        GIT_SHA: ${GIT_SHA:-unknown}
    profiles: [prod]
    environment:
      - OPENSEARCH_URL=http://opensearch:9200
      - WIKI_ROOT=/wiki
      # catalog.sqlite is decoupled from data_root onto the fast local /mnt/data
      # disk: SQLite's per-statement locking becomes slow synchronous round-trips
      # over NFS. See accommodanda config.resolve_catalog_root (CATALOG_ROOT env).
      - CATALOG_ROOT=/app/catalog
    volumes:
      # data_root: the bulk corpus (artifact/ generated/ downloaded/ dumps/) on
      # the roomy 2 TB /mnt/forstor NFS mount.
      - /mnt/forstor/accommodanda:/app/site/data
      # catalog_root: just catalog.sqlite (+ -wal/-shm), on the fast local disk.
      - /mnt/data/accommodanda:/app/catalog
      - /mnt/data/lagen-wiki:/wiki         # begrepp/kommentar markdown repo (git clone on the host)
      # Secrets + editor registry (editor_secret, editors[].pwhash, ops_token, LLM
      # key). config.py reads config.yml from the repo root (/app); without this
      # mount the file is absent and everything falls back to defaults -- the inline
      # editor 403s ("editing disabled -- set editor_secret"). Kept out of the image
      # and out of git; mounted read-only from the host. Adding/removing this line
      # needs `up -d accommodanda` (recreate) to attach; editing the file's contents
      # afterwards only needs `restart accommodanda` (config.yml is read once at import).
      - /home/staffan/wds/accommodanda/config.yml:/app/config.yml:ro
    depends_on:
      - opensearch   # start order only, not a health gate: serving + the CLI don't
                      # need a live OpenSearch (see api/app.py), only /search does
    restart: always
    logging:
      options:
        max-size: "10m"
        max-file: "10"

  # --- prod: ACME cert issuance/renewal (lagen.nu + ferenda.lagen.nu) ------
  # Official, actively maintained certbot image -- replaces the certbot 0.30.2
  # baked into the old andreilhicas/nginx-letsencrypt nginx image, which is
  # ACME-API-incompatible with current Let's Encrypt (missing Content-Type
  # header on POST-as-GET; every renewal failed). Certbot only writes files
  # here -- it does not serve anything -- via two volumes shared with nginx:
  # the ACME http-01 webroot (challenge files nginx serves back to LE) and the
  # cert output dir nginx's ssl_certificate directives read from.
  #
  # One-time SAN cert covering both vhosts (run once; `renew` below only
  # renews an existing cert, it doesn't create one):
  #   docker compose run --rm certbot certonly --webroot -w /var/www/certbot \
  #     -d lagen.nu -d ferenda.lagen.nu \
  #     --email staffan.malmgren@gmail.com --agree-tos --non-interactive
  certbot:
    image: certbot/certbot:v3.1.0
    profiles: [prod]
    volumes:
      - /mnt/data/lagen/letsencrypt:/etc/letsencrypt        # certbot's own state: account + live/archive certs
      - certbot-webroot:/var/www/certbot                    # shared ACME http-01 webroot with nginx
      - /mnt/data/lagen/certificates:/usr/share/nginx/certificates  # nginx's cert dir; deploy-hook copies here
    entrypoint: >
      sh -c "trap exit TERM; while :; do
      certbot renew --webroot -w /var/www/certbot --quiet
      --deploy-hook 'cp /etc/letsencrypt/live/lagen.nu/fullchain.pem /etc/letsencrypt/live/lagen.nu/privkey.pem /usr/share/nginx/certificates/';
      sleep 12h & wait $${!}; done"
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "10"

  # --- prod: legacy lagen.nu stack (reproduced from master) ----------------
  nginx:
    build:
      context: docker/nginx
      # Base image + config: default.conf = lagen.nu, ferenda.lagen.nu.conf =
      # the rebuilt site. Cert issuance lives in the `certbot` service above;
      # nginx only reads the files it writes -- see /mnt/data/lagen/certificates
      # below. nginx does NOT auto-reload on renewal (no docker.sock access by
      # design -- see `certbot` service comment); reload periodically, e.g. a
      # host cron `docker compose exec nginx nginx -s reload` weekly, harmless
      # if no cert changed.
    profiles: [prod]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /mnt/data/lagen/data:/usr/share/nginx/html:ro
      - /mnt/data/lagen/certificates:/usr/share/nginx/certificates/
      - certbot-webroot:/var/www/certbot                    # serves ACME http-01 challenges for certbot
      - /home/staffan/wds/ferenda/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/staffan/wds/ferenda/docker/nginx/ferenda.lagen.nu.conf:/etc/nginx/conf.d/ferenda.lagen.nu.conf:ro
    depends_on:
      - ferenda
      - mediawiki
      - matomo
      - accommodanda
      - certbot
    restart: always
    logging:
      options:
        max-size: "10m"
        max-file: "10"
  ferenda:
    # The legacy app image. It CANNOT be built from this branch: the
    # modernization branch deleted requirements.txt (the legacy root Dockerfile
    # does `COPY requirements.txt .`), replacing it with pyproject/uv.lock for
    # accommodanda. So reference the already-built legacy image rather than
    # rebuilding it. Tag your existing/prod legacy image as `lagen-ferenda:legacy`
    # (e.g. `docker tag <old-ferenda-image> lagen-ferenda:legacy`) or adjust here.
    # (On master, where requirements.txt still exists, this can go back to
    # `build: {context: .}` if you cherry-pick this file over there.)
    image: lagen-ferenda:legacy
    profiles: [prod]
    volumes:
      - /mnt/data/lagen:/usr/share/site
      - .:/usr/share/ferenda
      - ./lagen/nu/res/patches:/usr/share/lagen/nu/res/patches
    restart: always
    depends_on:
      - elasticsearch
      - fuseki
    stdin_open: true
    logging:
      options:
        max-size: "10m"
        max-file: "10"
  elasticsearch:
    image: elasticsearch:7.7.1
    profiles: [prod]
    volumes:
      - /mnt/data/elasticsearch:/usr/share/elasticsearch/data
    environment:
      - "discovery.type=single-node"
      # was 8g/8g: measured heap_used was ~1.3GB (16%) against the 1.37M-doc
      # `lagen` index (14GB on disk) -- Xms=Xmx=8g eagerly commits the full 8GB
      # at JVM startup regardless of actual usage, which combined with
      # OpenSearch's heap pushed the 15GB prod host into swap thrashing. 3g
      # leaves >2x headroom over observed usage.
      - "ES_JAVA_OPTS=-Xms3g -Xmx3g"
    restart: always
    logging:
      options:
        max-size: "10m"
        max-file: "10"
  fuseki:
    build:
      context: docker/fuseki
    profiles: [prod]
    volumes:
      - fuseki:/fuseki
    environment:
      - "JVM_ARGS=-Xmx2g"
      - "FUSEKI_DATASET_1=lagen"
    restart: always
    logging:
      options:
        max-size: "10m"
        max-file: "10"
  mediawiki:
    build:
      context: docker/mediawiki
    profiles: [prod]
    volumes:
      - /mnt/data/mediawiki/db:/var/www/data
      - /mnt/data/mediawiki/images:/var/www/html/w/images
    restart: always
    logging:
      options:
        max-size: "10m"
        max-file: "10"
  db:
    image: mariadb
    command: --max-allowed-packet=64MB
    profiles: [prod]
    volumes:
      - db:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=ncfeGpSR63xmnyTa
    restart: always
    logging:
      options:
        max-size: "10m"
        max-file: "10"
  matomo:
    image: matomo:5
    profiles: [prod]
    environment:
      - MATOMO_DATABASE_HOST=db
      - MYSQL_PASSWORD=ncfeGpSR63xmnyTa
      - MYSQL_DATABASE=matomo
      - MYSQL_USER=root
    restart: always
    logging:
      options:
        max-size: "10m"
        max-file: "10"

volumes:
  db:
  fuseki:
  elasticsearch:
  # The OpenSearch index (~28 G) lives on the roomy /mnt/forstor NFS, not the
  # local docker-root disk. A bind-type local volume keeps the volume NAME
  # (ferenda_opensearch-data) stable -- so `sync-up index` still targets it by
  # name -- while its storage is the NFS path. The dir is owned 1000:3362
  # (opensearch uid + lagen-nfs gid) so the container can write the root_squashed
  # export; see .bin/sync-up for the matching -u 1000:3362 on the remote unpack.
  opensearch-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/forstor/opensearch
  certbot-webroot:
