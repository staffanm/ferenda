# DEV compose for accommodanda -- the search backend the pipeline needs.
#
#   DEV  (workstation; just the search backend the pipeline needs):
#       docker compose up -d
#     -> starts *only* opensearch (it carries no profile). Run accommodanda
#        itself straight from the working tree -- `lagen all serve` -- since in
#        dev it is continuously re-edited and restarted; no point containerising.
#
# PROD note: production is ferenda.lagen.nu (= lagen.nu = 130.236.254.142,
# LiU/Lysator -- NOT the retired Hetzner `ferenda-vps`). There the host runs ONE
# merged compose project that serves BOTH the legacy lagen.nu stack and
# accommodanda behind a single nginx; that authoritative deploy config lives on
# the host in ~/wds/ferenda, not here. The `prod` profile below dates from the
# earlier standalone-accommodanda-only setup and is being reconciled with the
# merged layout -- treat it as historical, not the current prod topology.
#
# Rule of thumb: a service with NO `profiles:` key starts in every invocation
# (that's opensearch, shared by dev and prod); everything tagged
# `profiles: [prod]` starts only under `--profile prod`.

services:
  # --- shared: the rebuilt full-text index (dev + prod) --------------------
  # Single-node, security-disabled OpenSearch at the code's default endpoint.
  # Security is OFF on purpose: a local index over public data. Port 9200 is
  # published to 127.0.0.1 ONLY (never the public interface) so a dev box can
  # reach it at localhost:9200 while the VPS keeps it off the internet; the
  # accommodanda container reaches it over the compose network as
  # http://opensearch:9200 regardless.
  opensearch:
    # Pinned to 3.7.0 (Lucene 10). Was frozen at 2.9.0 because 2.10.0+ images
    # require the x86-64-v2 CPU baseline the host's virtualized CPU didn't expose
    # (2.10.0 died with "Fatal glibc error: CPU does not support x86-64-v2"). The
    # hypervisor CPU model was upgraded to x86-64-v3 in 2026-07, lifting the block;
    # 3.7.0 boots clean + green. The index is derived & rebuildable, so the
    # 2.x->3.x major bump is a nuke-and-rebuild, not an in-place migration. Pin a
    # specific patch, not floating 3.
    image: opensearchproject/opensearch:3.7.0
    container_name: lagen-opensearch
    environment:
      - discovery.type=single-node           # one node; relaxes the bootstrap checks
      - DISABLE_SECURITY_PLUGIN=true          # -> plain http://opensearch:9200, no auth
      - DISABLE_INSTALL_DEMO_CONFIG=true      # skip the demo TLS certs/users
      - bootstrap.memory_lock=true            # keep the JVM heap out of swap
      - OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g    # this VPS has ~7.5GB RAM and, unlike
                                              # the old shared host, no legacy
                                              # Elasticsearch competing for it, so
                                              # 2g is comfortable for the ~1M-doc
                                              # index. Raise if heap pressure shows.
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "127.0.0.1:9200:9200"   # REST API -- loopback only (dev convenience; off the public NIC)
    volumes:
      - opensearch-data:/usr/share/opensearch/data   # persist the index across restarts
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18          # first boot can take a couple of minutes
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "10"

  # --- prod: the rebuilt site + the in-container pipeline -------------------
  # The code is baked into the image (which also carries the full pipeline
  # toolchain); the corpus, the bulky downloaded/ tree (on the mounted volume)
  # and the git-backed wiki content repo are read-write bind-mounts. One uvicorn
  # process serves the static site + REST API (`lagen all serve`, the CMD); the
  # same container runs maintenance in place:
  #     docker compose exec accommodanda lagen all rebuild   # CI, after a push
  #     docker compose exec accommodanda lagen all all       # nightly cron
  # Runs as uid 1001 / gid 3362 (see the image's USER app) -- the host bind mounts
  # are owned by that uid, and the gid is REQUIRED to write the data_root.
  accommodanda:
    build:
      context: .
      dockerfile: docker/accommodanda/Dockerfile
      args:
        # uid 1001 = the host `staffan` user that owns the bind-mounted corpus
        # (both /mnt/forstor/accommodanda and the /mnt/data catalog dir).
        UID: "1001"
        # gid 3362 = the host `lagen-nfs` group. The data_root lives on the
        # Forstor NFS mount, which is root_squashed (root -> nobody, no write) and
        # group-writable only by lagen-nfs -- so the in-container pipeline writes
        # (lagen all all / rebuild: downloaded/, artifact/, generated/) must run
        # under gid 3362, NOT root, or they get EPERM against the NFS export.
        GID: "3362"
        # the deployed revision, baked into the image for the ops dashboard;
        # the deploy passes GIT_SHA=$GITHUB_SHA (see .github/workflows/deploy.yml).
        GIT_SHA: ${GIT_SHA:-unknown}
    container_name: accommodanda
    profiles: [prod]
    environment:
      - OPENSEARCH_URL=http://opensearch:9200
      - WIKI_ROOT=/wiki
    volumes:
      # data_root: everything except downloaded/ (artifacts, catalog, generated,
      # dumps) on the fast fixed disk.
      - /srv/ferenda/site/data:/app/site/data
      # The bulky downloaded/ tree lives on the mounted volume; /app/site/data
      # contains a `downloaded` symlink pointing at THIS absolute path, so we
      # mount it at the same path inside the container for the symlink to resolve.
      - /mnt/HC_Volume_106236756/downloaded:/mnt/HC_Volume_106236756/downloaded
      # begrepp/kommentar markdown -- git-backed; the inline editor commits here.
      - /srv/ferenda/lagen-wiki:/wiki
      # Secrets + editor registry (ops_token, editor_secret, editors) and the LLM
      # key -- kept out of the image (.dockerignore) and out of git; mounted from
      # the host at runtime. config.py reads config.yml from the repo root (/app);
      # lib/llm.py load_dotenv() reads /app/.env.
      - /srv/ferenda/config.yml:/app/config.yml:ro
      - /srv/ferenda/.env:/app/.env:ro
    depends_on:
      - opensearch   # start order only, not a health gate: serving + the CLI don't
                     # need a live OpenSearch (see api/app.py), only /search does
    restart: always
    logging:
      options:
        max-size: "10m"
        max-file: "10"

  # --- prod: the public front (ferenda.lagen.nu) ---------------------------
  # Unprivileged nginx (uid 101): listens on 8080/8443, host maps 80/443 onto
  # them. Serves the precompressed generated/ site's .br files directly
  # (Content-Encoding: br, stock image -- see ferenda.conf); proxies the API,
  # editor, browse indexes, transformed-namespace URLs and non-brotli clients to
  # accommodanda:8000. Reads the live cert + ACME webroot the certbot sidecar writes.
  nginx:
    build:
      context: docker/vps/nginx
    container_name: lagen-nginx
    profiles: [prod]
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      - letsencrypt:/etc/letsencrypt:ro          # live cert (certbot writes, nginx reads)
      - certbot-webroot:/var/www/certbot:ro       # ACME http-01 challenge files
      # the precompressed rendered site, read-only -- nginx streams the .br as-is
      - /srv/ferenda/site/data/generated:/srv/generated:ro
    depends_on:
      - accommodanda
    restart: always
    logging:
      options:
        max-size: "10m"
        max-file: "10"

  # --- prod: ACME cert issuance/renewal for ferenda.lagen.nu ---------------
  # Renews every 12h via the http-01 webroot challenge (nginx serves the shared
  # webroot on :80). The FIRST issuance is done out-of-band with --standalone
  # before nginx exists -- see docs/deploy-vps.md. Renewed certs are picked up by
  # nginx on its next reload (a weekly host cron, harmless if nothing changed;
  # certbot has no docker.sock access to reload nginx itself, by design).
  certbot:
    # Pinned, not :latest -- the old stack learned this the hard way (a frozen
    # certbot 0.30.2 went ACME-API-incompatible and every renewal silently
    # failed). Pin for reproducibility, same rationale as the opensearch pin.
    image: certbot/certbot:v3.1.0
    container_name: lagen-certbot
    profiles: [prod]
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    # After each renew, relax read perms on live/ + archive/ so the UNPRIVILEGED
    # nginx (uid 101) can read the cert + key -- certbot writes privkey 0600 root,
    # which nginx otherwise can't open ("Permission denied"). a+rX only adds read
    # (files) / traverse (dirs); on this single-tenant box the letsencrypt volume
    # is mounted by certbot + nginx only. Runs every loop, so it's self-healing.
    entrypoint: >
      sh -c "trap exit TERM; while :; do
      certbot renew --webroot -w /var/www/certbot --quiet;
      chmod -R a+rX /etc/letsencrypt/live /etc/letsencrypt/archive 2>/dev/null || true;
      sleep 12h & wait $${!}; done"
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "10"

volumes:
  opensearch-data:
  letsencrypt:
  certbot-webroot:
