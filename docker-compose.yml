# OpenSearch for the rebuilt lagen.nu full-text index
# (REWRITE.md §6 / accommodanda/lib/search.py).
#
# The old pipeline's full nginx + elasticsearch:7.7.1 + fuseki + mediawiki +
# matomo stack lived here; on the modernization branch it is retired (still in
# git history). Bring up just OpenSearch with:
#
#     docker compose up -d
#
# wait for it to report healthy (`docker compose ps`), then build and query:
#
#     lagen all relate     # the catalog -- the index's prerequisite
#     lagen all index      # bulk-index the corpus into this cluster
#     lagen serve-api      # then search via /api/v1/search (or the site's ⌘K box)
#
# A single-node, security-disabled OpenSearch 2.x reachable at the code's default
# endpoint -- plain http://localhost:9200, no TLS, no auth -- matching
# config.DEFAULT_OPENSEARCH_URL. Security is OFF on purpose: a local dev index
# over public data, and the client speaks plain HTTP without credentials.
# Do NOT expose port 9200 publicly. On WSL2, if it won't boot, raise
# vm.max_map_count: `sudo sysctl -w vm.max_map_count=262144`.

services:
  opensearch:
    image: opensearchproject/opensearch:2.18.0   # ':2' tracks the latest 2.x
    container_name: lagen-opensearch
    environment:
      - discovery.type=single-node           # one node; relaxes the bootstrap checks
      - DISABLE_SECURITY_PLUGIN=true          # -> plain http://localhost:9200, no auth
      - DISABLE_INSTALL_DEMO_CONFIG=true      # skip the demo TLS certs/users
      - bootstrap.memory_lock=true            # keep the JVM heap out of swap
      - OPENSEARCH_JAVA_OPTS=-Xms3g -Xmx3g    # headroom for a ~1M+ doc parent-child
                                              # index; the join field's global ordinals
                                              # are the main heap consumer (now lazy)
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"        # REST API -- the endpoint the code connects to
      - "9600:9600"        # performance analyzer (optional)
    volumes:
      - opensearch-data:/usr/share/opensearch/data   # persist the index across restarts
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18          # first boot can take a couple of minutes

volumes:
  opensearch-data:
