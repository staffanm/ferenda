# ferenda.lagen.nu -- the rebuilt (accommodanda) site.
#
# accommodanda serves the whole thing from one uvicorn process: the REST API
# (/api/v1/*, /docs, /openapi.json) answers first, everything else is the
# generated static site, and its SiteFiles handler resolves lagen.nu's bare
# document URLs (/2018:585, /dom/ad/1993:100, ...) internally. So nginx does
# not replicate the try_files/rewrite grammar the legacy lagen.nu vhost needs
# (default.conf) -- it just reverse-proxies every request to the app.
#
# The container name `accommodanda` resolves on the compose network (see
# docker-compose.yml); the app listens on :8000.

server {
    listen 80;
    server_name ferenda.lagen.nu;

    # keep ACME http-01 challenges answerable (shared webroot with lagen.nu)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name ferenda.lagen.nu;

    # Shares lagen.nu's certificate files. Add `ferenda.lagen.nu` to the nginx
    # service's DOMAIN env (docker-compose.yml) so the ACME client reissues one
    # SAN cert covering both names. Referencing the existing files means nginx
    # still boots before that reissue -- TLS just warns for this name until then.
    ssl_certificate /usr/share/nginx/certificates/fullchain.pem;
    ssl_certificate_key /usr/share/nginx/certificates/privkey.pem;
    include /etc/ssl-options/options-nginx-ssl.conf;
    ssl_dhparam /etc/ssl-options/ssl-dhparams.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    charset utf-8;
    client_max_body_size 4m;
    server_tokens off;                 # don't advertise the nginx version

    # The rebuilt site is a not-yet-promoted duplicate of lagen.nu's content, so
    # it must never be indexed or treated as canonical over lagen.nu. X-Robots-Tag
    # noindex is the load-bearing signal: robots.txt (served from the generated
    # root) now PERMITS crawling on purpose, because a crawler has to fetch the
    # page to see this header -- a blanket Disallow would hide it and risk the URL
    # being indexed by reference only. `always` so it rides error responses too.
    # These sit at server scope and reach the proxied response because `location /`
    # declares no add_header of its own (nginx replaces, never merges, per
    # location). Drop the X-Robots-Tag when this host is promoted to canonical.
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        proxy_pass http://accommodanda:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }
}
