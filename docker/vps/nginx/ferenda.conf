# ferenda.lagen.nu -- the standalone accommodanda VPS front.
#
# nginx serves the precompressed generated/ site DIRECTLY: `lagen generate` writes
# every page and asset as a single Brotli variant (`2018:585.html.br`, no plain
# file), so nginx just streams those bytes with `Content-Encoding: br`. It never
# compresses or decompresses -- the ngx_brotli module is NOT needed; this is the
# stock nginx-unprivileged image. Only three things a static handler would do are
# done by hand below: pick the `.br`, gate on the client accepting br, and stamp
# Content-Encoding/Vary/Content-Type (the latter literal, per file type, so the
# charset module never transcodes a compressed body).
#
# Everything nginx cannot resolve to a `.br` on disk falls through to the app
# (@app), which serves it: the transformed-namespace bare URLs whose flattened
# on-disk name differs from the URL (/dom, /celex, /prop, /<fs>, /avg -- the app
# mints the name via layout.url_to_relpath), the /sfs browse indexes, the REST API
# + editor, and any client that does not accept brotli (the app decompresses
# identity bytes for it). A missing generated/ mount degrades to proxy-everything;
# nothing 404s that the app could have served.
#
# Unprivileged image (uid 101): listens 8080/8443, compose maps host 80->8080,
# 443->8443. `accommodanda` is the app service on the compose network (:8000).

# Does the client accept brotli? (br;q=0 -- an explicit refusal -- is treated as
# acceptance here; it is vanishingly rare and only costs that client a proxy hop.)
map $http_accept_encoding $accepts_br { default 0; "~*\bbr\b" 1; }

server {
    listen 8080;
    server_name ferenda.lagen.nu;

    # Let's Encrypt http-01 challenges (the certbot sidecar writes the webroot).
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 8443 ssl;
    server_name ferenda.lagen.nu;

    # Issued + renewed by the certbot sidecar into the shared cert volume; the
    # runbook (docs/deploy-vps.md) issues the cert before this server's first up.
    ssl_certificate /etc/letsencrypt/live/ferenda.lagen.nu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ferenda.lagen.nu/privkey.pem;
    include /etc/ssl-options/options-nginx-ssl.conf;
    ssl_dhparam /etc/ssl-options/ssl-dhparams.pem;
    # (ssl_protocols come from options-nginx-ssl.conf; don't re-declare.)

    charset utf-8;
    client_max_body_size 4m;
    # WIP duplicate of lagen.nu: robots.txt already disallows crawling; this is the
    # belt-and-suspenders "don't index even if crawled", `always` for error responses.
    add_header X-Robots-Tag "noindex, nofollow" always;

    # the precompressed generated/ tree, mounted read-only (docker-compose.yml)
    root /srv/generated;

    # Resolve the app's container name at request time via Docker's embedded DNS,
    # NOT at startup: a literal upstream makes nginx refuse to boot if `accommodanda`
    # isn't resolvable yet (startup races / app restart). With a variable, nginx
    # starts regardless and returns 502 until the app is up.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # --- dynamic + mutating surface: always to the app, matched first so the
    #     editor's POSTs never reach the static handler ---
    location /api/           { set $up http://accommodanda:8000; proxy_pass $up; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_http_version 1.1; }
    location = /openapi.json { set $up http://accommodanda:8000; proxy_pass $up; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /docs           { set $up http://accommodanda:8000; proxy_pass $up; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /ops            { set $up http://accommodanda:8000; proxy_pass $up; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }

    # --- precompressed static serving ---
    # homepage: /  ->  /index.html.br
    location = / {
        error_page 404 = @app;
        if ($accepts_br = 0)                 { return 404; }
        if (-f $document_root/index.html.br) { rewrite ^/$ /index.html.br last; }
        return 404;
    }
    # a bare page URL (/2018:585, /2018:585/konsolidering/2021:76) -> <path>.html.br;
    # an asset (/style.css) -> <path>.br. The -f guard means anything without a
    # matching precompressed file (transformed namespaces, misses) drops to @app,
    # and appending .html *before* directory handling avoids nginx 301-ing a doc
    # URL that also exists as a directory (/2018:585 vs the /2018:585/ konsolidering tree).
    location / {
        error_page 404 = @app;
        if ($accepts_br = 0)               { return 404; }
        if (-f $document_root$uri.html.br) { rewrite ^(.*)$ $1.html.br last; }
        if (-f $document_root$uri.br)      { rewrite ^(.*)$ $1.br last; }
        return 404;
    }

    # precompressed byte-servers (internal; reached only via the rewrites above).
    # `internal` blocks a direct request for a *.br path. Literal default_type so
    # the charset filter never rewrites the compressed body.
    location ~ \.html\.br$       { internal; include /etc/nginx/brotli-headers.conf; default_type "text/html; charset=utf-8"; }
    location ~ \.css\.br$        { internal; include /etc/nginx/brotli-headers.conf; default_type "text/css; charset=utf-8"; }
    location ~ \.js\.br$         { internal; include /etc/nginx/brotli-headers.conf; default_type "application/javascript; charset=utf-8"; }
    location ~ \.json\.br$       { internal; include /etc/nginx/brotli-headers.conf; default_type "application/json; charset=utf-8"; }
    location ~ \.svg\.br$        { internal; include /etc/nginx/brotli-headers.conf; default_type "image/svg+xml"; }
    location ~ \.(atom|xml)\.br$ { internal; include /etc/nginx/brotli-headers.conf; default_type "application/xml; charset=utf-8"; }
    location ~ \.txt\.br$        { internal; include /etc/nginx/brotli-headers.conf; default_type "text/plain; charset=utf-8"; }
    location ~ \.br$            { internal; include /etc/nginx/brotli-headers.conf; default_type "application/octet-stream"; }

    location @app {
        set $up http://accommodanda:8000;
        proxy_pass $up;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }
}
