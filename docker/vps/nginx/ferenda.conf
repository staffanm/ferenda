# ferenda.lagen.nu -- the standalone accommodanda VPS front.
#
# This is the ONLY vhost on ferenda-vps: the box no longer runs the legacy
# lagen.nu stack, so there is no try_files/rewrite grammar to replicate --
# accommodanda serves the whole thing (REST API first, then the generated
# static site, whose SiteFiles handler resolves bare document URLs internally),
# so nginx just reverse-proxies everything to the app on the compose network.
#
# Runs under the *unprivileged* nginx image (nginxinc/nginx-unprivileged): the
# master runs as uid 101, so it cannot bind <1024. It listens on 8080/8443 and
# the compose file maps host 80->8080, 443->8443. `accommodanda` is the app
# service name on the compose network; it listens on :8000.

server {
    listen 8080;
    server_name ferenda.lagen.nu;

    # Let's Encrypt http-01 challenges: the certbot sidecar drops tokens into
    # the shared webroot volume, nginx serves them.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 8443 ssl;
    server_name ferenda.lagen.nu;

    # Issued + renewed by the certbot sidecar into the shared cert volume. Until
    # the first issuance lands these files are absent and nginx would refuse to
    # start -- the runbook (docs/deploy-vps.md) issues the cert *before* the
    # first `up` of this service.
    ssl_certificate /etc/letsencrypt/live/ferenda.lagen.nu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ferenda.lagen.nu/privkey.pem;
    include /etc/ssl-options/options-nginx-ssl.conf;
    ssl_dhparam /etc/ssl-options/ssl-dhparams.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    charset utf-8;
    client_max_body_size 4m;

    # The rebuilt site is still a work-in-progress duplicate of lagen.nu's
    # content; robots.txt already disallows crawling, but this header is the
    # belt-and-suspenders "don't index even if crawled", `always` so it rides
    # error responses too.
    add_header X-Robots-Tag "noindex, nofollow" always;

    location / {
        proxy_pass http://accommodanda:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }
}
