# Headers stamped on every precompressed (.br) response nginx serves directly
# (included by each internal `location ~ \.br$` variant in ferenda.conf). Any
# location with its own add_header stops inheriting the server-level set, so the
# common site-wide headers (incl. X-Robots-Tag) are re-included here rather than
# lost -- see common-headers.conf for why this repetition is required.
add_header Content-Encoding br always;         # the bytes on disk are Brotli
add_header Vary Accept-Encoding always;        # cache correctly per encoding
include /etc/nginx/common-headers.conf;        # X-Robots-Tag + security hygiene
