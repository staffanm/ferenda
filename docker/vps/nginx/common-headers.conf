# Response headers common to every ferenda.lagen.nu response. Included in TWO
# places on purpose:
#   1. the server block (covers @app, /api, /ops, /docs -- locations with no
#      add_header of their own inherit the server-scope set), and
#   2. brotli-headers.conf (the static `.br` locations declare their own
#      add_header for Content-Encoding/Vary, and nginx *replaces* rather than
#      merges the add_header set per location -- so a location with any
#      add_header stops inheriting the server-scope ones and must repeat them).
# Keeping them in one file is what stops the two sites from drifting; the live
# X-Robots-Tag regression (present on disk, absent on the wire) was exactly this
# inheritance gap.
#
# X-Robots-Tag: ferenda.lagen.nu is a not-yet-promoted duplicate of lagen.nu.
# `noindex` keeps its URLs out of search results so they are never mistaken for
# the canonical lagen.nu ones. This is the load-bearing signal, NOT robots.txt:
# a crawler must be allowed to FETCH the page to see this header, so robots.txt
# permits crawling (a Disallow would hide the noindex and risk url-only indexing).
# Remove this header (only) when the site is promoted to be the canonical host.
add_header X-Robots-Tag "noindex, nofollow" always;

# Hygiene, host-agnostic:
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Strict-Transport-Security "max-age=31536000" always;
